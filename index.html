<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeucoCount Pro | Edición Modular</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
            --label-bg: rgba(15, 23, 42, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Header & Dashboard */
        .header {
            padding: 1rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .counter-box {
            flex-grow: 1;
        }

        .counter-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .counter-value {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .counter-value span {
            color: var(--accent);
        }

        .wbc-group {
            text-align: right;
        }

        .wbc-group label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .wbc-input {
            width: 120px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
        }

        .progress-container {
            height: 4px;
            background: var(--card);
            border-radius: 99px;
            overflow: hidden;
        }

        #p-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        /* Modular Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .cell-btn {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 120px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .cell-btn:active {
            transform: scale(0.96);
            border-color: var(--accent);
        }

        .cell-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .cell-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--label-bg);
            color: white;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            min-width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            font-size: 0.7rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 20;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .badge.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Controls */
        .controls {
            padding: 1rem;
            display: flex;
            gap: 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .ctrl-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .undo {
            background: #334155;
            color: var(--danger);
        }

        .reset {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* Results Modal */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        .results-table th {
            text-align: left;
            font-size: 0.65rem;
            color: var(--text-muted);
            padding-bottom: 10px;
        }

        .results-table td {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .copy-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="dashboard">
            <div class="counter-box">
                <span class="counter-label">Relativa</span>
                <div class="counter-value"><span id="t-count">0</span>/100</div>
            </div>
            <div class="wbc-group">
                <label>Total Leucocitos</label>
                <input type="tel" id="wbc-total" class="wbc-input" value="0">
            </div>
        </div>
        <div class="progress-container">
            <div id="p-fill"></div>
        </div>
    </header>

    <main class="grid">
        <button class="cell-btn" onclick="tap('basofilo')">
            <img src="images/basofilo.jpg" class="cell-img">
            <div class="badge" id="badge-basofilo">0</div>
            <div class="cell-label">Basofilo</div>
        </button>
        <button class="cell-btn" onclick="tap('eosinofilo')">
            <img src="images/eosinofilo.jpg" class="cell-img">
            <div class="badge" id="badge-eosinofilo">0</div>
            <div class="cell-label">Eosinofilo</div>
        </button>
        <button class="cell-btn" onclick="tap('monocito')">
            <img src="images/monocito.jpg" class="cell-img">
            <div class="badge" id="badge-monocito">0</div>
            <div class="cell-label">Monocito</div>
        </button>
        <button class="cell-btn" onclick="tap('linfocito_reactivo')">
            <img src="images/linfocito_reactivo.jpg" class="cell-img">
            <div class="badge" id="badge-linfocito_reactivo">0</div>
            <div class="cell-label">Linfo. Reactivo</div>
        </button>
        <button class="cell-btn" onclick="tap('linfocito')">
            <img src="images/linfocito.jpg" class="cell-img">
            <div class="badge" id="badge-linfocito">0</div>
            <div class="cell-label">Linfocito</div>
        </button>
        <button class="cell-btn" onclick="tap('neutrofilo_segmentado')">
            <img src="images/neutrofilo_segmentado.jpg" class="cell-img">
            <div class="badge" id="badge-neutrofilo_segmentado">0</div>
            <div class="cell-label">N. Segmentado</div>
        </button>
        <button class="cell-btn" style="grid-column: span 2;" onclick="tap('neutrofilo_banda')">
            <img src="images/neutrofilo_banda.jpg" class="cell-img">
            <div class="badge" id="badge-neutrofilo_banda">0</div>
            <div class="cell-label">Neutrofilo en Banda</div>
        </button>
    </main>

    <footer class="controls">
        <button class="ctrl-btn undo" onclick="undo()">⟲ DESHACER</button>
        <button class="ctrl-btn reset" onclick="reset()">REINICIAR</button>
    </footer>

    <div id="modal">
        <div class="modal-card">
            <h3 style="text-align:center; color: var(--accent);">Resultados Finales</h3>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Célula</th>
                        <th style="text-align:right">%</th>
                        <th style="text-align:right">mm³</th>
                    </tr>
                </thead>
                <tbody id="r-body"></tbody>
            </table>
            <button class="copy-btn" onclick="copy()">COPIAR REPORTE</button>
            <div style="text-align:center; margin-top:15px; font-size:0.8rem; color:var(--text-muted); text-decoration:underline;"
                onclick="closeM()">Volver</div>
        </div>
    </div>

    <script>
        const state = {
            counts: { basofilo: 0, eosinofilo: 0, monocito: 0, linfocito_reactivo: 0, linfocito: 0, neutrofilo_segmentado: 0, neutrofilo_banda: 0 },
            history: [],
            total: 0
        };

        const labs = {
            basofilo: "Basofilo", eosinofilo: "Eosinofilo", monocito: "Monocito",
            linfocito_reactivo: "Linfo Reactivo", linfocito: "Linfocito",
            neutrofilo_segmentado: "N. Segmentado", neutrofilo_banda: "N. Banda"
        };

        function tap(type) {
            if (state.total >= 100) return;
            state.counts[type]++;
            state.total++;
            state.history.push(type);
            if (navigator.vibrate) navigator.vibrate(state.total === 100 ? 250 : 40);
            render();
            if (state.total === 100) setTimeout(showResults, 400);
        }

        function undo() {
            if (state.history.length === 0) return;
            state.counts[state.history.pop()]--;
            state.total--;
            render();
        }

        function reset() {
            if (confirm("¿Seguro que quieres reiniciar?")) location.reload();
        }

        function render() {
            document.getElementById('t-count').innerText = state.total;
            document.getElementById('p-fill').style.width = `${state.total}%`;

            for (let key in state.counts) {
                const b = document.getElementById(`badge-${key}`);
                const count = state.counts[key];
                b.innerText = count;
                if (count > 0) b.classList.add('visible');
                else b.classList.remove('visible');
            }
        }

        function showResults() {
            const wbc = parseFloat(document.getElementById('wbc-total').value) || 0;
            const body = document.getElementById('r-body');
            body.innerHTML = '';
            for (let k in state.counts) {
                const percent = state.counts[k];
                const abs = ((percent / 100) * wbc).toFixed(0);
                body.innerHTML += `<tr><td>${labs[k]}</td><td style="text-align:right; font-weight:bold; color:var(--success);">${percent}%</td><td style="text-align:right; font-weight:800;">${Number(abs).toLocaleString()}</td></tr>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        async function copy() {
            const wbc = document.getElementById('wbc-total').value;
            let t = `REPORTE HEMATOLÓGICO\nTotal Blancos: ${wbc} /mm³\n--------------------\n`;
            for (let k in state.counts) {
                const abs = ((state.counts[k] / 100) * wbc).toFixed(0);
                t += `${labs[k].padEnd(15)}: ${state.counts[k]}% (${abs}/mm³)\n`;
            }
            await navigator.clipboard.writeText(t);
            const b = document.querySelector('.copy-btn');
            b.innerText = "¡COPIADO!";
            b.style.background = "var(--success)";
            setTimeout(() => { b.innerText = "COPIAR REPORTE"; b.style.background = "var(--accent)"; }, 2000);
        }
    </script>
</body>

</html>
