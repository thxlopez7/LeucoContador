<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeucoCount Pro | Contador Hematológico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* Header */
        .header {
            padding: 1.5rem 1rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .counter-display {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }

        .total-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .count-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .count-value span {
            color: var(--accent);
        }

        .progress-bar {
            height: 8px;
            background: var(--card);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        #fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #d8b4fe);
            box-shadow: 0 0 15px var(--accent-glow);
            border-radius: 999px;
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Real-time Stats */
        .live-stats {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            background: rgba(30, 41, 59, 0.5);
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }

        .live-stats::-webkit-scrollbar {
            display: none;
        }

        .stat-chip {
            background: var(--card);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            white-space: nowrap;
            border: 1px solid var(--border);
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stat-chip span {
            font-weight: 700;
            color: var(--accent);
        }

        /* Grid de Botones */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
        }

        .btn {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            aspect-ratio: 1/1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:active {
            transform: scale(0.94);
            background: var(--card-hover);
            border-color: var(--accent);
        }

        .btn img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .btn:active img {
            opacity: 0.8;
        }

        .btn-label {
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .key-hint {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-btn {
            height: 100%;
        }

        .full-width {
            grid-column: span 2;
            aspect-ratio: auto;
            min-height: 80px;
        }

        /* Controls */
        .bottom-bar {
            padding: 1rem;
            display: flex;
            gap: 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .bar-btn {
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .undo {
            flex: 2;
            background: #334155;
            color: var(--danger);
        }

        .reset {
            flex: 1;
            background: #334155;
            color: var(--text-secondary);
        }

        .bar-btn:active {
            opacity: 0.7;
        }

        /* Modal */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .results-list {
            text-align: left;
            margin: 1.5rem 0;
            background: var(--bg);
            border-radius: 16px;
            padding: 1rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            border: 0;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            width: 100%;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .close-btn {
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="counter-display">
            <div class="total-label">Conteo Total</div>
            <div class="count-value"><span id="counter">0</span>/100</div>
        </div>
        <div class="progress-bar">
            <div id="fill"></div>
        </div>
    </div>

    <div class="live-stats" id="liveStats">
        <!-- Live chips will be injected here -->
    </div>

    <div class="grid">
        <button class="btn" onclick="add('basofilo')" data-key="B">
            <div class="key-hint">B</div>
            <img src="images/basofilo.jpg"><span class="btn-label">Basófilo</span>
        </button>
        <button class="btn" onclick="add('eosinofilo')" data-key="E">
            <div class="key-hint">E</div>
            <img src="images/eosinofilo.jpg"><span class="btn-label">Eosinófilo</span>
        </button>

        <button class="btn" onclick="add('monocito')" data-key="M">
            <div class="key-hint">M</div>
            <img src="images/monocito.jpg"><span class="btn-label">Monocito</span>
        </button>
        <button class="btn" onclick="add('linfocito_reactivo')" data-key="R">
            <div class="key-hint">R</div>
            <img src="images/linfocito_reactivo.jpg"><span class="btn-label">Linfo. Reactivo</span>
        </button>

        <button class="btn main-btn" onclick="add('linfocito')" data-key="L">
            <div class="key-hint">L</div>
            <img src="images/linfocito.jpg"><span class="btn-label">Linfocito</span>
        </button>
        <button class="btn main-btn" onclick="add('neutrofilo_segmentado')" data-key="S">
            <div class="key-hint">S</div>
            <img src="images/neutrofilo_segmentado.jpg"><span class="btn-label">N. Segmentado</span>
        </button>

        <button class="btn full-width" onclick="add('neutrofilo_banda')" data-key="N">
            <div class="key-hint">N</div>
            <img src="images/neutrofilo_banda.jpg"><span class="btn-label">Neutrófilo en Banda</span>
        </button>
    </div>

    <div class="bottom-bar">
        <button class="bar-btn undo" onclick="undo()">⟲ DESHACER</button>
        <button class="bar-btn reset" onclick="reset()">REINICIAR</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="font-weight: 800; color: var(--accent);">Formula Completa</h2>
            <div class="results-list" id="resultsList"></div>
            <button class="copy-btn" onclick="copyResult()">COPIAR RESULTADOS</button>
            <div class="close-btn" onclick="closeModal()">Seguir editando</div>
        </div>
    </div>

    <script>
        let counts = {
            basofilo: 0, eosinofilo: 0, monocito: 0,
            linfocito_reactivo: 0, linfocito: 0,
            neutrofilo_segmentado: 0, neutrofilo_banda: 0
        };
        let history = [];
        let total = 0;

        const cellNames = {
            basofilo: "Basófilos",
            eosinofilo: "Eosinófilos",
            monocito: "Monocitos",
            linfocito_reactivo: "Linfo. Reactivos",
            linfocito: "Linfocitos",
            neutrofilo_segmentado: "N. Segmentados",
            neutrofilo_banda: "N. en Banda"
        };

        const keyMap = {
            'b': 'basofilo', 'B': 'basofilo',
            'e': 'eosinofilo', 'E': 'eosinofilo',
            'm': 'monocito', 'M': 'monocito',
            'r': 'linfocito_reactivo', 'R': 'linfocito_reactivo',
            'l': 'linfocito', 'L': 'linfocito',
            's': 'neutrofilo_segmentado', 'S': 'neutrofilo_segmentado',
            'n': 'neutrofilo_banda', 'N': 'neutrofilo_banda',
            'z': 'undo', 'Z': 'undo'
        };

        window.addEventListener('keydown', (e) => {
            const action = keyMap[e.key];
            if (!action) return;
            if (action === 'undo') undo();
            else add(action);
        });

        function add(type) {
            if (total >= 100) return;
            counts[type]++;
            total++;
            history.push(type);
            if (navigator.vibrate) navigator.vibrate(40);
            update();
            if (total === 100) finish();
        }

        function undo() {
            if (history.length === 0) return;
            counts[history.pop()]--;
            total--;
            update();
        }

        function update() {
            document.getElementById('counter').innerText = total;
            document.getElementById('fill').style.width = total + "%";
            renderLiveStats();
        }

        function renderLiveStats() {
            const container = document.getElementById('liveStats');
            container.innerHTML = '';
            for (let key in counts) {
                if (counts[key] > 0) {
                    const chip = document.createElement('div');
                    chip.className = 'stat-chip';
                    chip.innerHTML = `${cellNames[key]} <span>${counts[key]}%</span>`;
                    container.appendChild(chip);
                }
            }
        }

        function reset() {
            if (confirm("¿Seguro que quieres borrar el conteo actual?")) {
                location.reload();
            }
        }

        function finish() {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            for (let key in counts) {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `<span>${cellNames[key]}</span> <b>${counts[key]}%</b>`;
                list.appendChild(item);
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function copyResult() {
            let text = "FORMULA LEUCOCITARIA:\n";
            for (let key in counts) {
                text += `${cellNames[key]}: ${counts[key]}%\n`;
            }
            text += `Total: ${total}/100`;

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.innerText;
                btn.innerText = "¡COPIADO!";
                btn.style.background = "var(--success)";
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.background = "var(--accent)";
                }, 2000);
            });
        }
    </script>
</body>

</html>
