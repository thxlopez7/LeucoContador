<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeucoCount Pro | Bioquímica Clínica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
            --header-h: 120px;
            --footer-h: 80px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            /* Evita que la UI de Opera tape botones */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            /* Evita zoom por doble tap */
        }

        /* Header & Dashboard */
        .header {
            padding: 1.25rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .counter-box {
            flex-grow: 1;
        }

        .counter-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .counter-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .counter-value span {
            color: var(--accent);
        }

        .wbc-input-group {
            text-align: right;
            max-width: 140px;
        }

        .wbc-input-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .wbc-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
        }

        .progress-container {
            height: 6px;
            background: var(--card);
            border-radius: 99px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #d8b4fe);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Ergonomic Grid (Power Zone) */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
        }

        .cell-btn {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .cell-btn:active {
            transform: scale(0.95);
            background: var(--border);
        }

        .cell-btn img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .cell-btn.active img {
            opacity: 0.9;
        }

        .cell-label {
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        /* Power Zone (Thumb Reach) */
        .power-item {
            aspect-ratio: auto;
            min-height: 90px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Controls */
        .controls {
            padding: 1rem;
            display: flex;
            gap: 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .control-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            background: var(--card);
            color: var(--text-muted);
            cursor: pointer;
        }

        .undo {
            flex: 2;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Results Modal */
        #results-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-card {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            border-radius: 28px;
            padding: 2rem 1.5rem;
            border: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .results-table th {
            text-align: left;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .results-table td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .results-table tr:last-child td {
            border: 0;
        }

        .rel-val {
            color: var(--success);
            font-weight: 700;
        }

        .abs-val {
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
        }

        .close-btn {
            background: transparent;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="dashboard">
            <div class="counter-box">
                <p class="counter-label">Relativa Contada</p>
                <h1 class="counter-value"><span id="total-count">0</span>/100</h1>
            </div>
            <div class="wbc-input-group">
                <label for="wbc-total">Total Blancos/mm³</label>
                <input type="number" id="wbc-total" class="wbc-input" placeholder="Ej: 8000" value="0">
            </div>
        </div>
        <div class="progress-container">
            <div id="progress-fill"></div>
        </div>
    </header>

    <main class="grid">
        <!-- ZONA SUPERIOR: Células menos frecuentes -->
        <button class="cell-btn" onclick="cellTap('basofilo')">
            <img src="images/basofilo.jpg">
            <span class="cell-label">Basófilos</span>
        </button>
        <button class="cell-btn" onclick="cellTap('eosinofilo')">
            <img src="images/eosinofilo.jpg">
            <span class="cell-label">Eosinófilos</span>
        </button>
        <button class="cell-btn" onclick="cellTap('monocito')">
            <img src="images/monocito.jpg">
            <span class="cell-label">Monocitos</span>
        </button>
        <button class="cell-btn" onclick="cellTap('linfocito_reactivo')">
            <img src="images/linfocito_reactivo.jpg">
            <span class="cell-label">Linfo. Reactivo</span>
        </button>

        <!-- POWER ZONE: Células de mayor frecuencia (Acceso rápido pulgar) -->
        <button class="cell-btn power-item" onclick="cellTap('linfocito')">
            <img src="images/linfocito.jpg">
            <span class="cell-label">Linfocitos</span>
        </button>
        <button class="cell-btn power-item" onclick="cellTap('neutrofilo_segmentado')">
            <img src="images/neutrofilo_segmentado.jpg">
            <span class="cell-label">Segmentados</span>
        </button>
        <button class="cell-btn power-item full-width" onclick="cellTap('neutrofilo_banda')">
            <img src="images/neutrofilo_banda.jpg">
            <span class="cell-label">Neutrófilos en Banda</span>
        </button>
    </main>

    <footer class="controls">
        <button class="control-btn undo" onclick="undoTap()">⟲ DESHACER</button>
        <button class="control-btn" onclick="resetTap()">RESET</button>
    </footer>

    <!-- Result Modal -->
    <div id="results-modal">
        <div class="modal-card">
            <h2 class="modal-title">Fórmula Leucocitaria</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Célula</th>
                        <th style="text-align: right">%</th>
                        <th style="text-align: right">mm³</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
            <div class="action-group">
                <button class="action-btn copy-btn" onclick="copyResults()">COPIAR REPORTE</button>
                <button class="action-btn close-btn" onclick="toggleModal(false)">Volver a Editar</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            counts: {
                basofilo: 0, eosinofilo: 0, monocito: 0,
                linfocito_reactivo: 0, linfocito: 0,
                neutrofilo_segmentado: 0, neutrofilo_banda: 0
            },
            history: [],
            total: 0,
            isLocked: false
        };

        const cellLabels = {
            basofilo: "Basófilos",
            eosinofilo: "Eosinófilos",
            monocito: "Monocitos",
            linfocito_reactivo: "Linfo. Reactivos",
            linfocito: "Linfocitos",
            neutrofilo_segmentado: "N. Segmentados",
            neutrofilo_banda: "N. en Banda"
        };

        function cellTap(type) {
            if (state.total >= 100) return;

            state.counts[type]++;
            state.total++;
            state.history.push(type);

            if (navigator.vibrate) {
                navigator.vibrate(state.total === 100 ? 200 : 40);
            }

            render();

            if (state.total === 100) {
                setTimeout(() => toggleModal(true), 300);
            }
        }

        function undoTap() {
            if (state.history.length === 0) return;
            const last = state.history.pop();
            state.counts[last]--;
            state.total--;
            render();
        }

        function resetTap() {
            if (confirm("¿Reiniciar conteo?")) {
                location.reload();
            }
        }

        function render() {
            document.getElementById('total-count').innerText = state.total;
            document.getElementById('progress-fill').style.width = `${state.total}%`;
        }

        function toggleModal(show) {
            const modal = document.getElementById('results-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) calculateResults();
        }

        function calculateResults() {
            const wbcTotal = parseFloat(document.getElementById('wbc-total').value) || 0;
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';

            for (const [key, val] of Object.entries(state.counts)) {
                if (val === 0 && state.total < 100) continue; // No mostrar ceros si no terminó, opcional

                const absolute = ((val / 100) * wbcTotal).toFixed(0);
                const row = `
                    <tr>
                        <td>${cellLabels[key]}</td>
                        <td style="text-align: right" class="rel-val">${val}%</td>
                        <td style="text-align: right" class="abs-val">${Number(absolute).toLocaleString()}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        }

        async function copyResults() {
            const wbcTotal = document.getElementById('wbc-total').value;
            let text = `REPORTE HEMATOLÓGICO\n`;
            text += `Total Leucocitos: ${wbcTotal} /mm³\n`;
            text += `--------------------------------\n`;
            text += `CÉLULA | REL (%) | ABS (/mm³)\n`;

            for (const [key, val] of Object.entries(state.counts)) {
                const abs = ((val / 100) * wbcTotal).toFixed(0);
                text += `${cellLabels[key].padEnd(15)}: ${val}% | ${abs}\n`;
            }

            try {
                await navigator.clipboard.writeText(text);
                const btn = document.querySelector('.copy-btn');
                btn.innerText = "¡REPORTE COPIADO!";
                btn.style.background = "var(--success)";
                setTimeout(() => {
                    btn.innerText = "COPIAR REPORTE";
                    btn.style.background = "var(--accent)";
                }, 2000);
            } catch (err) {
                alert("Error al copiar");
            }
        }
    </script>
</body>

</html>
